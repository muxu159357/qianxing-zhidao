spring:
  profiles:
    active: dev

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000

wx:
  appid: ${WX_APPID:wxaba2cf77773a606f}
  secret: ${WX_SECRET:}

llm:
  api-base-url: ${LLM_API_BASE_URL:}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:}

weather:
  provider: ${WEATHER_PROVIDER:}
  api-base-url: ${WEATHER_API_BASE_URL:}
  api-key: ${WEATHER_API_KEY:}
  update-enabled: ${WEATHER_UPDATE_ENABLED:false}
