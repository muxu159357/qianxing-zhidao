spring:
  profiles:
    active: dev

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000

wx:
  appid: ${WX_APPID:}
  secret: ${WX_SECRET:}

llm:
  api-base-url: ${LLM_API_BASE_URL:}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:}

weather:
  provider: ${WEATHER_PROVIDER:}
  api-base-url: ${WEATHER_API_BASE_URL:}
  api-key: ${WEATHER_API_KEY:}
  update-enabled: ${WEATHER_UPDATE_ENABLED:false}

admin:
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:管理员}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
